[project]
name = "mcp-university"
version = "0.3.8"
description = "Agentic University Memory System with MCP"
dependencies = [
    "fastmcp",
    "ollama",
    "qdrant-client",
    "watchdog",
    "pydantic",
    "pyyaml",

    "rank_bm25",
    "sentence-transformers",
    "docling",
    "extract-msg",
    "pdfminer.six",
    "python-docx",
    "beautifulsoup4",
    "markdown",
    "rich",
    "typer",
    "scikit-learn",
    "pandas",
    "numpy",
]
requires-python = ">=3.10"

[project.scripts]
mcp-uni = "mcp_university.cli.main:app"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["mcp_university*"]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = false
ignore-magic = true
fail-under = 95
verbose = 1
exclude = ["setup.py", "docs", "build", "tests"]
