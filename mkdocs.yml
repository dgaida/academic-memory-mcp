site_name: MCP University Memory System
site_description: Lokales, agentisches Wissenssystem für Universitäten und Forschung.
site_author: Senior Python Architect
site_url: https://dgaida.github.io/academic-memory-mcp/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - content.code.annotate
    - navigation.footer

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            separate_signature: true
  - mermaid2:
      arguments:
        theme: 'default'
  - mike:
      alias_type: symlink

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  version:
    provider: mike
  language_tabs:
    - python: Python
    - bash: Bash

nav:
  - Home: index.md
  - Endnutzer-Handbuch:
      - Start: getting-started.md
      - Use Cases:
          - E-Mail Suche: usage/email-search.md
          - Terminverwaltung: usage/appointment-management.md
          - Automatisiertes Beantworten von E-Mails: usage/email-workflow.md
          - Personaldatenbank: usage/profiles.md
          - Finale Abgabe: usage/final-submission.md
          - Outlook Makros: usage/outlook-macros.md
      - Installation & Einrichtung:
          - Installation: installation.md
          - Einrichtung: setup.md
          - Konfiguration: configuration.md
          - Fehlerbehandlung: troubleshooting.md
      - Sonstiges:
          - Hilfsskripte: usage/scripts.md
  - Technische Dokumentation:
      - Architektur: architecture/index.md
      - Nutzung (Expert): usage/index.md
      - Indexierung im Detail: usage/indexing-details.md
      - Datenbank-Management: usage/database-management.md
      - Datenbank-Prozesse: usage/database-processes.md
      - MCP Integration: usage/mcp.md
      - E-Mail Parsing: usage/email-parsing.md
      - RAG Prozess: usage/rag-process.md
      - Memory Update: usage/memory.md
      - Ontology & Aliase: usage/ontology-learning.md
      - API: api/index.md
      - Packages:
          - E-Mail Klassifizierer:
              - Übersicht: packages/email-classifier/index.md
              - Nutzung der Skripte: packages/email-classifier/usage.md
              - Training & Evaluierung: packages/email-classifier/training.md
              - XAI & Visualisierung: packages/email-classifier/analysis.md
              - Architektur: packages/email-classifier/architecture.md
              - Neuronale Netzarchitektur: packages/email-classifier/nn_architecture.md
          - TH Personal Graph:
              - Übersicht: packages/th-personal-graph/index.md
              - Nutzung der Skripte: packages/th-personal-graph/usage.md
              - MOCOGI Extraktion: packages/th-personal-graph/mocogi.md
              - Architektur & Logik: packages/th-personal-graph/architecture.md
      - Entwicklung:
          - Übersicht: development/index.md
          - Docstring Guide: development/docstring-guide.md
          - Changelog: development/changelog.md
          - Versionierung: development/versioning.md
          - Metriken: metrics.md

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
