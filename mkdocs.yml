site_name: MCP University Memory System
site_description: Lokales, agentisches Wissenssystem für Universitäten und Forschung.
site_author: Senior Python Architect
site_url: https://dgaida.github.io/academic-memory-mcp/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            separate_signature: true
  - mermaid2:
      arguments:
        theme: 'default'
  - mike:
      alias_type: symlink

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  version:
    provider: mike
  language_tabs:
    - python: Python
    - bash: Bash

nav:
  - Home: index.md
  - Start: getting-started.md
  - Installation: installation.md
  - Konfiguration: configuration.md
  - Nutzung:
      - Übersicht: usage/index.md
      - Indexierung im Detail: usage/indexing-details.md
      - Datenbank-Management: usage/database-management.md
      - MCP Integration: usage/mcp.md
      - Hilfsskripte: usage/scripts.md
      - Datenbank-Prozesse: usage/database-processes.md
      - MOCOGI Extraktion: usage/mocogi-extraction.md
      - E-Mail Workflow: usage/email-workflow.md
      - E-Mail Parsing: usage/email-parsing.md
      - RAG Prozess: usage/rag-process.md
      - Memory Update: usage/memory.md
      - Outlook Makros: usage/outlook-macros.md
      - Personen-Steckbriefe: usage/profiles.md
      - Ontology & Aliase: usage/ontology-learning.md
  - API: api/index.md
  - Architektur: architecture/index.md
  - Packages:
      - E-Mail Klassifizierer:
          - Übersicht: packages/email-classifier/index.md
          - Nutzung: packages/email-classifier/usage.md
          - Architektur: packages/email-classifier/architecture.md
  - Entwicklung:
      - Übersicht: development/index.md
      - Docstring Guide: development/docstring-guide.md
      - Changelog: development/changelog.md
      - Versionierung: development/versioning.md
      - Metriken: metrics.md
  - Fehlerbehebung: troubleshooting.md

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
