[project]
name = "th_personal_graph"
version = "1.0.0"
description = "TH Personal und Modulzuordnungen Graph Package"
dependencies = [
    "requests",
    "beautifulsoup4",
    "networkx",
    "pyvis",
    "pyyaml",
]
requires-python = ">=3.10"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["th_personal_graph*"]
