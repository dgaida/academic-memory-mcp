[project]
name = "academic_parser"
version = "1.0.0"
description = "Parser package for various file types (PDF, Mail, Text, DOCX)"
dependencies = [
    "pydantic",
    "pdfminer.six",
    "python-docx",
    "extract-msg",
    "beautifulsoup4",
]
requires-python = ">=3.10"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["academic_parser*"]
